function calculate(){
  let assetBetas=[];

  for(let i=0;i<10;i++){
    let beta = parseFloat(document.getElementById("beta"+i).value);
    let de = parseFloat(document.getElementById("finanzierungsverhältnis"+i).value);

    if(!isNaN(beta) && !isNaN(de)){
      let betaA = beta / (1 + de); // FK-Beta = 0
      assetBetas.push(betaA);
    }
  }

  assetBetas.sort((a,b)=>a-b);

  let mean = assetBetas.reduce((a,b)=>a+b,0)/assetBetas.length;
  let median = assetBetas[Math.floor(assetBetas.length/2)];

  let targetDE = parseFloat(document.getElementById("targetDE").value);

  let relevered = mean * (1 + targetDE);

  document.getElementById("output").innerHTML =
    "Mean Asset Beta: "+mean.toFixed(3)+"<br>"+
    "Median Asset Beta: "+median.toFixed(3)+"<br>"+
    "Relevered Beta: "+relevered.toFixed(3);
}
